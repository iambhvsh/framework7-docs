name: Update Framework7 Knowledge

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: framework7-knowledge
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: actions/requirements.txt

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r actions/requirements.txt


      - name: Build knowledge artifacts
        run: |
          python actions/main.py

      - name: Validate generated artifacts
        run: |
          test -f actions/data/knowledge.json
          test -f actions/data/manifest.json
          test -f actions/data/search-index.json
          test -f actions/data/metadata.json
          test -f actions/data/kv-bulk.json
          python -m json.tool actions/data/knowledge.json > /dev/null
          python -m json.tool actions/data/manifest.json > /dev/null
          python -m json.tool actions/data/search-index.json > /dev/null
          python -m json.tool actions/data/metadata.json > /dev/null
          python -m json.tool actions/data/kv-bulk.json > /dev/null

      - name: Commit if changed
        run: |
          if git diff --quiet actions/data/; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add actions/data/knowledge.json actions/data/manifest.json actions/data/search-index.json actions/data/metadata.json actions/data/kv-bulk.json
          git commit -m "chore(data): update Framework7 knowledge artifacts"
          git push
