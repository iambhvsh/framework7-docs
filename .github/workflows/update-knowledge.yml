name: Update Framework7 Knowledge

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: framework7-knowledge
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: generator/requirements.txt

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r generator/requirements.txt

      - name: Build knowledge artifacts
        run: |
          python generator/build_knowledge.py --source framework7_react_docs_tsx.json --output data

      - name: Validate generated artifacts
        run: |
          python -m json.tool data/knowledge.json > /dev/null
          python -m json.tool data/manifest.json > /dev/null
          python -m json.tool data/search-index.json > /dev/null
          python -m json.tool data/metadata.json > /dev/null
          python -m json.tool data/kv-bulk.json > /dev/null

      - name: Commit if changed
        run: |
          if git diff --quiet data/; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "chore(data): update Framework7 knowledge artifacts"
          git push
