name: Update Framework7 Knowledge

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: framework7-knowledge
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: actions/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: /home/runner/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('actions/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r actions/requirements.txt

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps only (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Cache scrape HTML
        uses: actions/cache@v4
        with:
          path: ~/.f7_cache
          key: f7-html-cache-${{ github.run_id }}
          restore-keys: |
            f7-html-cache-

      - name: Build knowledge artifacts
        run: python actions/main.py

      - name: Validate artifacts
        run: |
          for f in knowledge.json manifest.json search-index.json metadata.json kv-bulk.json; do
            test -f "actions/data/$f" && python -m json.tool "actions/data/$f" > /dev/null
          done

      - name: Commit if changed
        run: |
          if git diff --quiet actions/data/; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add actions/data/knowledge.json actions/data/manifest.json \
                  actions/data/search-index.json actions/data/metadata.json \
                  actions/data/kv-bulk.json
          git commit -m "chore(data): update Framework7 knowledge artifacts"
          git push
